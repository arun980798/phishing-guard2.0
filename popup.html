<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent-safe: #22c55e;
      --accent-warn: #f59e0b;
      --accent-danger: #ef4444;
      --text: #e8eaf6;
      --muted: #8b8fa8;
      --radius: 10px;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #ef4444);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Score ring section ── */
    .score-section {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .score-ring-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }

    .score-ring-wrap svg {
      transform: rotate(-90deg);
    }

    .score-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
    }

    .score-info { flex: 1; }

    .verdict-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .verdict-badge.safe { background: rgba(34,197,94,.18); color: var(--accent-safe); }
    .verdict-badge.suspicious { background: rgba(245,158,11,.18); color: var(--accent-warn); }
    .verdict-badge.phishing { background: rgba(239,68,68,.18); color: var(--accent-danger); }

    .site-url {
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
      max-height: 30px;
      overflow: hidden;
    }

    /* ── Reasons list ── */
    .reasons-section {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      max-height: 130px;
      overflow-y: auto;
    }

    .reasons-section::-webkit-scrollbar { width: 4px; }
    .reasons-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .reasons-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .reason-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 0;
      font-size: 12px;
      color: #c5c8d6;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }

    .reason-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    /* ── Actions ── */
    .actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .btn {
      flex: 1;
      padding: 8px 10px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-danger  { background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
    .btn-safe    { background: rgba(34,197,94,.15); color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
    .btn-neutral { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .btn-danger:hover:not(:disabled)  { background: rgba(239,68,68,.25); }
    .btn-safe:hover:not(:disabled)    { background: rgba(34,197,94,.25); }
    .btn-neutral:hover:not(:disabled) { background: var(--border); }

    /* ── Lists section ── */
    .lists-section {
      padding: 10px 16px 14px;
    }

    .lists-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .list-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }

    .list-tab {
      flex: 1;
      padding: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }

    .list-tab.active {
      background: var(--surface);
      color: var(--text);
      border-color: #4f5580;
    }

    .list-items {
      max-height: 90px;
      overflow-y: auto;
    }

    .list-items::-webkit-scrollbar { width: 4px; }
    .list-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      border-radius: 5px;
      font-size: 11px;
      color: #c5c8d6;
    }

    .list-item:hover { background: var(--surface2); }

    .list-item-host { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .list-item-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 0 2px;
    }

    .list-item-remove:hover { color: #ef4444; }

    .empty-list {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      padding: 10px 0;
    }

    /* ── Status toast ── */
    .toast {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🛡</div>
    <div>
      <div class="header-title">PhishGuard</div>
      <div class="header-sub">Heuristic Phishing Detection</div>
    </div>
  </div>

  <!-- Score Section -->
  <div class="score-section">
    <div class="score-ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <!-- Track -->
        <circle cx="36" cy="36" r="30" fill="none" stroke="#2e3350" stroke-width="6"/>
        <!-- Progress -->
        <circle id="ringProgress" cx="36" cy="36" r="30" fill="none"
          stroke="#22c55e" stroke-width="6"
          stroke-dasharray="188.5"
          stroke-dashoffset="188.5"
          stroke-linecap="round"
          style="transition: stroke-dashoffset .6s ease, stroke .4s ease"/>
      </svg>
      <div class="score-number" id="scoreNum">–</div>
    </div>
    <div class="score-info">
      <div class="verdict-badge safe" id="verdictBadge">
        <span id="verdictIcon">●</span>
        <span id="verdictText">Analyzing…</span>
      </div>
      <div class="site-url" id="siteURL">Loading…</div>
    </div>
  </div>

  <!-- Reasons -->
  <div class="reasons-section" id="reasonsSection">
    <div class="reasons-label">Detection Signals</div>
    <div id="reasonsList"><div class="empty-list">No signals detected.</div></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-danger" id="btnPhishing" title="Add this site to blacklist">🚫 Mark Phishing</button>
    <button class="btn btn-safe"   id="btnSafe"    title="Whitelist this site">✔ Mark Safe</button>
    <button class="btn btn-neutral" id="btnRemove"  title="Remove from blacklist" style="display:none">✘ Unblock</button>
  </div>

  <!-- Lists (Blacklist / Whitelist viewer) -->
  <div class="lists-section">
    <div class="lists-label">Managed Sites</div>
    <div class="list-tabs">
      <div class="list-tab active" id="tabBlacklist">🚫 Blocked</div>
      <div class="list-tab" id="tabWhitelist">✔ Trusted</div>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
