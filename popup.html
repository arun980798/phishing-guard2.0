<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🛡</div>
    <div>
      <div class="header-title">PhishGuard</div>
      <div class="header-sub">Heuristic Phishing Detection</div>
    </div>
  </div>

  <!-- Score Section -->
  <div class="score-section">
    <div class="score-ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <!-- Track -->
        <circle cx="36" cy="36" r="30" fill="none" stroke="#2e3350" stroke-width="6"/>
        <!-- Progress -->
        <circle id="ringProgress" cx="36" cy="36" r="30" fill="none"
          stroke="#22c55e" stroke-width="6"
          stroke-dasharray="188.5"
          stroke-dashoffset="188.5"
          stroke-linecap="round"
          style="transition: stroke-dashoffset .6s ease, stroke .4s ease"/>
      </svg>
      <div class="score-number" id="scoreNum">–</div>
    </div>
    <div class="score-info">
      <div class="verdict-badge safe" id="verdictBadge">
        <span id="verdictIcon">●</span>
        <span id="verdictText">Analyzing…</span>
      </div>
      <div class="site-url" id="siteURL">Loading…</div>
    </div>
  </div>

  <!-- Reasons -->
  <div class="reasons-section" id="reasonsSection">
    <div class="reasons-label">Detection Signals</div>
    <div id="reasonsList"><div class="empty-list">No signals detected.</div></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-danger" id="btnPhishing" title="Add this site to blacklist">🚫 Mark Phishing</button>
    <button class="btn btn-safe"   id="btnSafe"    title="Whitelist this site">✔ Mark Safe</button>
    <button class="btn btn-neutral" id="btnRemove"  title="Remove from blacklist" style="display:none">✘ Unblock</button>
  </div>

  <!-- Lists (Blacklist / Whitelist viewer) -->
  <div class="lists-section">
    <div class="lists-label">Managed Sites</div>
    <div class="list-tabs">
      <div class="list-tab active" id="tabBlacklist">🚫 Blocked</div>
      <div class="list-tab" id="tabWhitelist">✔ Trusted</div>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
