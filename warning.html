<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠ Phishing Site Blocked – PhishGuard</title>
  <link rel="stylesheet" href="warning.css" />
</head>
<body>

<div class="container">
  <div class="shield-icon">🛡</div>

  <h1>Phishing Site Blocked</h1>
  <p class="subtitle">PhishGuard detected this site as dangerous.<br>Your security and privacy may be at risk.</p>

  <div class="card">
    <!-- Risk Score -->
    <div class="risk-section">
      <div class="risk-circle">
        <span class="risk-score-big" id="scoreDisplay">–</span>
        <span class="risk-label-sm">/ 100</span>
      </div>
      <div class="risk-info" style="flex:1">
        <h3>Risk Assessment</h3>
        <div class="risk-bar-wrap">
          <div class="risk-bar-fill" id="riskBar" style="width:0%"></div>
        </div>
        <div class="blocked-url" id="blockedURL">Loading…</div>
      </div>
    </div>

    <!-- Detection Reasons -->
    <div class="reasons-title">Detection Signals</div>
    <ul class="reasons-list" id="reasonsList">
      <li>Analyzing…</li>
    </ul>
  </div>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn btn-back" onclick="goBack()">← Go Back to Safety</button>
    <button class="btn btn-proceed" onclick="proceedAnyway()">Proceed anyway (unsafe)</button>
  </div>

  <p class="pg-footer">PhishGuard · Heuristic Detection · Fully Offline · No Data Sent</p>
</div>

<script>
  // Parse URL parameters
  const params = new URLSearchParams(location.search);
  const blockedURL = params.get("url") || "Unknown";
  const score = parseInt(params.get("score") || "0", 10);
  let reasons = [];
  try { reasons = JSON.parse(decodeURIComponent(params.get("reasons") || "[]")); }
  catch {}

  // Render score
  document.getElementById("scoreDisplay").textContent = score;
  document.getElementById("blockedURL").textContent = blockedURL;

  // Animate bar
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.getElementById("riskBar").style.width = score + "%";
    });
  });

  // Reasons list
  const list = document.getElementById("reasonsList");
  if (reasons.length > 0) {
    list.innerHTML = reasons.map(r => `<li>${escapeHTML(r)}</li>`).join("");
  } else {
    list.innerHTML = "<li>No detailed signals available</li>";
  }

  function escapeHTML(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function goBack() {
    // Try to go back; if no history, close tab
    if (history.length > 1) {
      history.back();
    } else {
      window.close();
    }
  }

  function proceedAnyway() {
    const confirmed = confirm(
      "⚠ WARNING: This site was flagged as dangerous.\n\n" +
      "Proceeding may expose you to phishing, credential theft, or malware.\n\n" +
      "Are you absolutely sure you want to continue?"
    );
    if (confirmed) {
      window.location.href = blockedURL;
    }
  }
</script>

</body>
</html>
